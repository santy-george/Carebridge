<div class="stage" data-app="admin">

    <div class="notch"></div>
    <div class="screen">
      <div class="login">

          <img class="login__logo" src="assets/cbh-logo.svg" alt="Care Bridge Home">

          <p>Sign in to see today's check-in, medications and vitals.</p>

          <div class="field"><label>Mobile number</label><input type="text" value="+1 (415) 555-0148" readonly></div>

          <a href="Home.dc.html"><button class="mbtn mbtn--fill mbtn--block">Sign in</button></a>
          <div class="login__demo">Demo login — <b>+1 (415) 555-0148</b> · PIN <b>1234</b></div>
        </div>
        <div class="login__foot"><span>Secure sign-in · Care Bridge Home</span></div>
