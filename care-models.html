<!DOCTYPE html>
<html lang="en" data-app="admin">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Care Bridge Home — Care Models</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/admin.css">
<style>
  .models-grid{ display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:18px }
  .model-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-xs); overflow:hidden; cursor:pointer; transition:box-shadow .18s var(--ease), transform .18s var(--ease) }
  .model-card:hover{ box-shadow:var(--shadow-md); transform:translateY(-2px) }
  .model-card.is-active{ outline:2px solid var(--mc, var(--accent)); outline-offset:-1px }
  .model-card__bar{ height:5px; background:var(--mc) }
  .model-card__body{ padding:18px }
  .model-card__top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px }
  .model-card__name{ font-family:var(--font-heading); font-weight:700; font-size:18px; color:var(--text-heading); display:flex; align-items:center; gap:9px }
  .model-card__name .dot{ width:11px; height:11px; border-radius:4px; background:var(--mc) }
  .model-card__total{ font-family:var(--font-heading); font-weight:700; font-size:26px; color:var(--text-heading); line-height:1 }
  .model-card__total small{ display:block; font-family:var(--font-body); font-weight:500; font-size:11px; color:var(--text-muted); text-align:right; margin-top:2px }
  .model-card__desc{ font-size:13px; color:var(--text-muted); margin:8px 0 0; min-height:36px }
  .plan-pills{ display:flex; gap:8px; margin-top:14px }
  .plan-pills .pp{ flex:1; text-align:center; background:var(--surface-sunken); border-radius:var(--radius-base); padding:9px 6px }
  .plan-pills .pp .n{ font-family:var(--font-heading); font-weight:700; font-size:16px; color:var(--text-heading) }
  .plan-pills .pp .l{ font-size:10px; text-transform:uppercase; letter-spacing:.4px; color:var(--text-muted); margin-top:2px }
  .model-card__foot{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; padding-top:12px; border-top:1px solid var(--border); font-size:13px }
  .model-card__rev{ color:var(--text-muted) }
  .plan-cols{ display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px }
  .plan-col{ background:var(--surface-sunken); border-radius:var(--radius-lg); padding:16px 18px }
  .plan-col h4{ font-family:var(--font-heading); font-weight:700; font-size:15px; color:var(--text-heading); display:flex; align-items:center; justify-content:space-between }
  .plan-col .price{ font-size:12px; color:var(--text-muted); margin:2px 0 12px }
  .assign-grid{ display:grid; grid-template-columns:minmax(0,1fr) 320px; gap:20px; align-items:start }
  @media(max-width:1200px){ .models-grid{grid-template-columns:1fr} .plan-cols{grid-template-columns:1fr} .assign-grid{grid-template-columns:1fr} }
  .member-pill{ display:flex; align-items:center; gap:10px; padding:10px 0 }
  .member-pill + .member-pill{ border-top:1px solid var(--border) }
  .member-pill__main{ flex:1; min-width:0 }
  .member-pill__main .name{ font-weight:600; font-size:14px; color:var(--text-heading) }
  .member-pill__main .sub{ font-size:12px; color:var(--text-muted) }
  .seg-models{ display:inline-flex; gap:2px; padding:4px; border-radius:var(--radius-full); background:var(--surface-sunken); border:1px solid var(--border) }
  .seg-models button{ padding:7px 14px; border-radius:var(--radius-full); font-size:13px; font-weight:500; color:var(--text-muted) }
  .seg-models button.is-active{ background:var(--surface); color:var(--text-heading); box-shadow:var(--shadow-xs) }
</style>
</head>
<body>
<script src="js/icons.js"></script>

<div class="app">
  <aside class="sidebar" id="sidebar" data-active="care-models"></aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar__search"><span class="icon"><svg><use href="#i-search"/></svg></span><input placeholder="Search members, visits, invoices…"></div>
      <div class="topbar__actions">
        <button class="icon-btn" aria-label="Messages"><span class="icon"><svg><use href="#i-mail"/></svg></span><span class="badge">2</span></button>
        <button class="icon-btn" aria-label="Notifications"><span class="icon"><svg><use href="#i-bell"/></svg></span><span class="badge">5</span></button>
        <div class="topbar-right">
          <span class="date-chip"><span class="icon"><svg><use href="#i-calendar"/></svg></span>Tue, 23 June 2026</span>
          <span class="date-chip"><span class="icon"><svg><use href="#i-clock"/></svg></span><span class="liveClock">09:14:22</span>&nbsp;IST</span>
        </div>
        <button class="btn btn--primary"><span class="icon"><svg><use href="#i-plus"/></svg></span>Add Enquiry</button>
      </div>
    </header>

    <main class="content">
      <div class="page-header reveal">
        <div class="page-header__txt">
          <h1>Care Models</h1>
          <p>Manage Digital Wellness, Virtual Care and Direct Care — plans, members and add-ons</p>
        </div>
        <div class="page-header__actions">
          <button class="btn btn--outline btn--sm" onclick="showTab('addons')"><span class="icon"><svg><use href="#i-catalogue"/></svg></span>Manage Add-ons</button>
          <button class="btn btn--primary btn--sm"><span class="icon"><svg><use href="#i-plus"/></svg></span>New plan level</button>
        </div>
      </div>

      <div class="tabs reveal reveal-2" style="margin-bottom:4px">
        <span class="tab is-active" data-tab="models" onclick="showTab('models')">Care models</span>
        <span class="tab" data-tab="members" onclick="showTab('members')">Members by model</span>
        <span class="tab" data-tab="addons" onclick="showTab('addons')">Add-ons</span>
      </div>

      <!-- TAB: CARE MODELS -->
      <section id="panel-models" class="reveal reveal-2" style="display:flex;flex-direction:column;gap:20px">
        <div class="models-grid" id="modelCards"></div>
        <div class="section-card" id="modelDetail"></div>
      </section>

      <!-- TAB: MEMBERS BY MODEL -->
      <section id="panel-members" style="display:none">
        <div class="assign-grid">
          <div class="section-card">
            <div class="section-card__head">
              <div class="seg-models" id="memberSeg"></div>
              <span class="muted" id="memberCount" style="font-size:13px"></span>
            </div>
            <table class="table"><thead><tr><th>Member</th><th>Plan</th><th>District</th><th>Last visit</th><th style="text-align:right">Move to</th></tr></thead><tbody id="memberRows"></tbody></table>
          </div>
          <aside class="section-card">
            <div class="section-card__head"><span class="section-card__title">Unassigned members</span><span class="chip chip--pending"><span class="dot"></span>3</span></div>
            <div id="unassigned"></div>
          </aside>
        </div>
      </section>

      <!-- TAB: ADD-ONS -->
      <section id="panel-addons" style="display:none">
        <div class="toolbar" style="margin-bottom:16px">
          <div class="toolbar__search"><span class="icon"><svg><use href="#i-search"/></svg></span><input placeholder="Search add-ons…"></div>
          <button class="filter">Category<span class="icon"><svg><use href="#i-chevron-down"/></svg></span></button>
          <button class="filter">Eligible model<span class="icon"><svg><use href="#i-chevron-down"/></svg></span></button>
          <div class="toolbar__spacer"></div>
          <button class="btn btn--primary btn--sm"><span class="icon"><svg><use href="#i-plus"/></svg></span>Add new add-on</button>
        </div>
        <div class="table-card">
          <table class="table"><thead><tr><th>Add-on</th><th>Category</th><th>Price</th><th>Eligible care models</th><th>Status</th></tr></thead><tbody id="addonRows"></tbody></table>
        </div>
      </section>
    </main>
  </div>
</div>

<script src="js/sidebar.js"></script>
<script src="js/app.js"></script>
<script>
var MODELS = {
  direct:{ key:'direct', cls:'direct', color:'var(--model-direct-care)', name:'Direct Care', members:25, revenue:'₹1.9L / mo',
    desc:'Professional in-person home care for members with clinical needs.',
    suited:'Members with clinical needs, chronic conditions, or post-hospital recovery.',
    plans:{
      Basic:{price:'₹3,500 / mo', items:['Initial assessment','Wellness risk score','Individual care plan','Routine home visits','Vitals monitoring']},
      Standard:{price:'₹5,200 / mo', items:['Everything in Basic','Symptom review','Medication review','Functional review','Mental wellbeing review','Falls prevention']},
      Premium:{price:'₹6,500 / mo', items:['Everything in Standard','Chronic disease support','Nutrition & hydration support','Family engagement','Referral & care coordination','Post-hospital & post-surgical support','Incident & risk management']}
    }, count:{Basic:6,Standard:12,Premium:7} },
  digital:{ key:'digital', cls:'digital', color:'var(--model-digital-wellness)', name:'Digital Wellness', members:61, revenue:'₹0.9L / mo',
    desc:'Client self-managed wellness support with family visibility.',
    suited:'Independent members who want preventive monitoring and family reassurance.',
    plans:{
      Basic:{price:'₹499 / mo', items:['Health profile','Daily wellness check-ins','Medication reminders','Vitals tracking']},
      Standard:{price:'₹799 / mo', items:['Everything in Basic','Activity tracking','Sleep tracking','Preventive care reminders','Wellness score dashboard']},
      Premium:{price:'₹1,199 / mo', items:['Everything in Standard','Family visibility','Basic reports','Priority support']}
    }, count:{Basic:34,Standard:19,Premium:8} },
  virtual:{ key:'virtual', cls:'virtual', color:'var(--model-virtual-care)', name:'Virtual Care', members:38, revenue:'₹1.4L / mo',
    desc:'Remote professional care and monitoring with escalation.',
    suited:'Members needing professional oversight without daily in-person visits.',
    plans:{
      Basic:{price:'₹1,499 / mo', items:['Virtual assessment','Remote nurse monitoring','Medication compliance monitoring']},
      Standard:{price:'₹2,499 / mo', items:['Everything in Basic','Family portal','Alert & escalation system','Wellness score review','Telehealth coordination']},
      Premium:{price:'₹3,999 / mo', items:['Everything in Standard','Monthly health reports','Preventive care tracking','Remote care plan management']}
    }, count:{Basic:15,Standard:16,Premium:7} }
};
var ORDER = ['direct','digital','virtual'];
var ADDONS = [
  ['Physiotherapy visit','Allied health','₹600–900','direct,virtual',1],
  ['Doctor visit','Doctor','₹800–1,500','direct,virtual,digital',1],
  ['Lab sample collection','Lab','₹200–350','direct,virtual,digital',1],
  ['Medication delivery','Pharmacy','₹50–99','direct,virtual,digital',1],
  ['Wound care','Nursing','₹500–800','direct',1],
  ['Post-surgical support','Nursing','₹1,200–2,500','direct',1],
  ['Dementia support','Specialist','₹1,500–3,000','direct,virtual',1],
  ['Fall prevention review','Allied health','₹600–900','direct,virtual',1],
  ['Nutrition consultation','Allied health','₹500–700','direct,virtual,digital',1],
  ['Emergency visit','Emergency','₹1,500–3,000','direct,virtual,digital',1],
  ['Extra wellness visit','Wellness','₹400–600','digital,virtual',1],
  ['Telehealth review','Virtual','₹400–700','virtual,digital',0]
];
var ASSIGNED = {
  direct:[['Kumari Lakshmi N.','Premium','Kakkanad','Today, 09:00'],['Gopal Nair','Premium','Irinjalakuda','Today, 11:30'],['Babu Thomas','Standard','Kottayam','14 Jun'],['Thankam George','Basic','Tvm','12 Jun']],
  digital:[['Radha Krishnan','Basic','Guruvayur','—'],['Suresh Pillai','Standard','Changanacherry','—']],
  virtual:[['Anjali Mohan','Standard','Aluva','Today, 10:00'],['Leela Varma','Basic','Calicut','21 Jun']]
};
var UNASSIGNED = [['Mini Thomas','Ernakulam · Assessment done'],['Sajan Joseph','Kottayam · Assessment done'],['Beena Raj','Thrissur · New member']];

function chip(cls,label){return '<span class="model-chip model-chip--'+cls+'"><span class="dot"></span>'+label+'</span>';}
function planPill(label){return '<span class="plan'+(label==='Premium'?' plan--premium':label==='Standard'?' plan--standard':'')+'">'+label+'</span>';}

function renderCards(active){
  document.getElementById('modelCards').innerHTML = ORDER.map(function(k){var m=MODELS[k];
    return '<div class="model-card'+(k===active?' is-active':'')+'" style="--mc:'+m.color+'" onclick="renderDetail(\''+k+'\')">'
      +'<div class="model-card__bar"></div><div class="model-card__body">'
      +'<div class="model-card__top"><div class="model-card__name"><span class="dot"></span>'+m.name+'</div>'
      +'<div class="model-card__total">'+m.members+'<small>members</small></div></div>'
      +'<p class="model-card__desc">'+m.desc+'</p>'
      +'<div class="plan-pills"><div class="pp"><div class="n">'+m.count.Basic+'</div><div class="l">Basic</div></div>'
      +'<div class="pp"><div class="n">'+m.count.Standard+'</div><div class="l">Standard</div></div>'
      +'<div class="pp"><div class="n">'+m.count.Premium+'</div><div class="l">Premium</div></div></div>'
      +'<div class="model-card__foot"><span class="model-card__rev">'+m.revenue+'</span><span style="color:var(--accent-text);font-weight:600">View &amp; edit ›</span></div>'
      +'</div></div>';
  }).join('');
}
function renderDetail(k){
  renderCards(k);
  var m=MODELS[k];
  var plans=Object.keys(m.plans).map(function(p){var pl=m.plans[p];
    return '<div class="plan-col"><h4>'+p+' '+planPill(p)+'</h4><div class="price">'+pl.price+'</div><ul class="incl">'
      +pl.items.map(function(it){return '<li><span class="tick"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 7"/></svg></span></span>'+it+'</li>';}).join('')
      +'</ul></div>';
  }).join('');
  document.getElementById('modelDetail').innerHTML =
    '<div class="section-card__head"><div><div class="mk mk--'+m.cls+'" style="font-size:18px;font-family:var(--font-heading)"><span class="dot" style="width:11px;height:11px"></span>'+m.name+'</div>'
    +'<p class="muted" style="margin-top:4px;font-size:13px">'+m.desc+' · <strong style="color:var(--text-body)">Best suited for:</strong> '+m.suited+'</p></div>'
    +'<div style="display:flex;gap:10px"><button class="btn btn--outline btn--sm">Edit inclusions</button><button class="btn btn--primary btn--sm">Save changes</button></div></div>'
    +'<div class="plan-cols">'+plans+'</div>';
}
function renderMembers(k){
  document.getElementById('memberSeg').innerHTML = ORDER.map(function(x){return '<button class="'+(x===k?'is-active':'')+'" onclick="renderMembers(\''+x+'\')">'+MODELS[x].name+'</button>';}).join('');
  var rows=ASSIGNED[k]||[];
  document.getElementById('memberCount').textContent = rows.length+' assigned';
  var others=ORDER.filter(function(x){return x!==k;});
  document.getElementById('memberRows').innerHTML = rows.map(function(r){
    var moves=others.map(function(o){return '<button class="btn btn--outline btn--sm" style="padding:5px 10px">'+MODELS[o].name+'</button>';}).join(' ');
    return '<tr data-href="member-profile.html"><td><div class="u"><span class="avatar avatar--sm">'+r[0].split(' ').map(function(w){return w[0]}).slice(0,2).join('')+'</span><span class="cell-link">'+r[0]+'</span></div></td>'
      +'<td>'+planPill(r[1])+'</td><td>'+r[2]+'</td><td class="muted">'+r[3]+'</td>'
      +'<td style="text-align:right;white-space:nowrap">'+moves+'</td></tr>';
  }).join('');
  document.getElementById('unassigned').innerHTML = UNASSIGNED.map(function(u){
    return '<div class="member-pill"><span class="avatar avatar--sm">'+u[0].split(' ').map(function(w){return w[0]}).join('')+'</span><div class="member-pill__main"><div class="name">'+u[0]+'</div><div class="sub">'+u[1]+'</div></div><button class="btn btn--secondary btn--sm">Assign</button></div>';
  }).join('');
}
function renderAddons(){
  document.getElementById('addonRows').innerHTML = ADDONS.map(function(a){
    var labels={direct:'Direct Care',virtual:'Virtual Care',digital:'Digital Wellness'};
    var elig=a[3].split(',').map(function(c){return chip(c,labels[c]);}).join(' ');
    var status=a[4]?'<span class="chip chip--completed"><span class="dot"></span>Active</span>':'<span class="chip chip--pending"><span class="dot"></span>Inactive</span>';
    return '<tr><td><span class="cell-link">'+a[0]+'</span></td><td class="muted">'+a[1]+'</td><td class="num">'+a[2]+'</td><td>'+elig+'</td><td>'+status+'</td></tr>';
  }).join('');
}
function showTab(t){
  ['models','members','addons'].forEach(function(x){ document.getElementById('panel-'+x).style.display = x===t?'':'none'; });
  document.querySelectorAll('.tab[data-tab]').forEach(function(el){ el.classList.toggle('is-active', el.getAttribute('data-tab')===t); });
}
renderDetail('direct'); renderMembers('direct'); renderAddons();
(function(){function tick(){var d=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));var t=[d.getHours(),d.getMinutes(),d.getSeconds()].map(function(n){return String(n).padStart(2,'0')}).join(':');document.querySelectorAll('.liveClock').forEach(function(el){el.textContent=t});}tick();setInterval(tick,1000);})();
</script>
</body>
</html>
