<!DOCTYPE html>
<html lang="en" data-app="field">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Care Bridge — Nurse sign in</title>
<link rel="stylesheet" href="css/tokens.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/mobile.css">
</head>
<body>
<script src="js/icons.js"></script>
<a class="back-rs" href="index.html" style="position:fixed;top:18px;left:18px;font-size:13px;font-weight:600;color:var(--text-muted);display:inline-flex;gap:6px;align-items:center;z-index:5"><span class="icon" style="width:15px;height:15px;transform:scaleX(-1)"><svg><use href="#i-chevron"/></svg></span>All apps</a>
<div class="stage">
  <div class="device">
    <div class="screen">
      <div class="login-top">
        <div class="sbar sbar--light" style="padding:0 0 18px"><span>9:41</span><span class="dots"><span class="icon"><svg><use href="#i-gps"/></svg></span><span class="icon"><svg><use href="#i-bell"/></svg></span></span></div>
        <img class="logo" src="assets/cbh-logo.svg" alt="Care Bridge Home">
        <h2>Field Care</h2>
        <p>Sign in to start your shift.</p>
      </div>
      <div class="login-body">
        <form class="login-form" onsubmit="location.href='nurse-home.html';return false">
          <div class="fld"><label>Staff ID or email</label><input type="text" value="sree.nair@carebridge.in"></div>
          <div class="fld"><label>Password</label><input type="password" value="care1234"></div>
          <button class="btn-lg btn-fill" type="submit" style="margin-top:4px">Sign in &amp; start shift</button>
          <button class="btn-lg btn-soft" type="button" onclick="location.href='nurse-home.html'"><span class="icon"><svg><use href="#i-shield"/></svg></span>Use biometric login</button>
        </form>
        <p class="demo-note">Demo login — <b>sree.nair@carebridge.in</b> / <b>care1234</b></p>
      </div>
    </div>
  </div>
</div>

</html>
